name: Nasazeni webu na GitHub Pages

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Stazeni kodu z repozitare
      uses: actions/checkout@v4

    - name: Nastaveni GitHub Pages
      uses: actions/configure-pages@v5

    - name: Zabaleni souboru pro web
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Publikovani na zivy web
      id: deployment
      uses: actions/deploy-pages@v4
